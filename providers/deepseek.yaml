# claude-code-bridge — DeepSeek provider template
#
# Routes through LiteLLM's OpenAI provider (not DeepSeek provider) to avoid
# the beta endpoint which forces reasoning mode. DeepSeek's API is
# OpenAI-compatible, so this works transparently.
#
# Model mapping:
#   deepseek-chat = DeepSeek V4 Flash (non-reasoning mode)
#   All tiers currently map to deepseek-chat until reasoning_content
#   round-trip support is added for deepseek-v4-pro.

model_list:
  - model_name: deepseek-chat
    litellm_params:
      model: hosted_vllm/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com/v1

  - model_name: deepseek-reasoner
    litellm_params:
      model: hosted_vllm/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com/v1
