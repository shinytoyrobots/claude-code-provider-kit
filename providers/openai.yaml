# claude-code-bridge — OpenAI provider template
#
# Tier mapping (used by Claude Code's per-skill model routing):
#   Opus   → gpt-5       (flagship — highest quality)
#   Sonnet → gpt-5-mini  (workhorse — balanced cost/quality)
#   Haiku  → gpt-5-nano  (cheap tier — fast, lowest cost)
#
# Sonnet-slot ambiguity (PRD Q10.7):
#   The Sonnet slot is the most contested mapping in the OpenAI lineup. gpt-5-mini
#   is a defensible default for general-purpose work, but if your skills are
#   reasoning-heavy (complex multi-step planning, code generation with strict
#   correctness requirements), consider swapping Opus to o3 or o4-mini and
#   shifting gpt-5 down to Sonnet. There is no single right answer here —
#   benchmark against your own skill library.
#
# Note: These model IDs were pinned on 2026-04-24 without a live /v1/models
# check (OPENAI_API_KEY was unavailable at pinning time). Verify the IDs are
# active on first run. If OpenAI has deprecated or renamed any of these,
# update the litellm_params.model values below.
#
# How to override:
#   - Change a tier alias: edit the model_name field (e.g. change "opus" to
#     point at openai/o3 instead of openai/gpt-5)
#   - Add a model: copy any entry below and change model_name + model
#   - Remove a model: delete or comment out the entry
#
# Shared settings (drop_params, etc.) live in templates/litellm.base.yaml.
# Start LiteLLM with both configs:
#   litellm --config templates/litellm.base.yaml --config providers/openai.yaml

model_list:
  # --- Tier aliases (Claude Code reads these via ANTHROPIC_DEFAULT_*_MODEL) ---
  - model_name: opus
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: sonnet
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: haiku
    litellm_params:
      model: openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY

  # --- Raw model names (for direct use or debugging) ---
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-nano
    litellm_params:
      model: openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY
